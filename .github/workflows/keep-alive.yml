name: Keep HF Backend Alive

on:
  schedule:
    - cron: '*/5 * * * *'   # runs every 5 minutes
  workflow_dispatch:          # lets you run it manually too

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the frontend (which calls the backend)
        run: |
          curl -s https://sayings-quotes.vercel.app/ > /dev/null
          echo "Pinged successfully"
